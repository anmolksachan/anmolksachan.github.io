<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%">
  <style>
    :root {
      --bg:      #0d1117;
      --bg2:     #161b22;
      --accent:  #00e5b0;
      --accent2: #7c3aed;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --grid:    rgba(0,229,176,0.06);
      --dim:     rgba(0,229,176,0.18);
      --border:  rgba(0,229,176,0.25);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:      #ffffff;
        --bg2:     #f0f6ff;
        --accent:  #0d7a5f;
        --accent2: #5b21b6;
        --text:    #0d1117;
        --muted:   #57606a;
        --grid:    rgba(13,122,95,0.05);
        --dim:     rgba(13,122,95,0.15);
        --border:  rgba(13,122,95,0.3);
      }
    }
    @keyframes blink   { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes pulse   { 0%,100%{opacity:.25} 50%{opacity:.9} }
    @keyframes shimmer { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-40} }
    @keyframes fadeup  { 0%{opacity:0;transform:translateY(6px)} 100%{opacity:1;transform:translateY(0)} }
    .cursor  { animation: blink 1.1s step-end infinite; }
    .shimmer { animation: shimmer 3s linear infinite; }
    .p1 { animation: pulse 2.8s ease-in-out infinite; }
    .p2 { animation: pulse 2.8s ease-in-out infinite .6s; }
    .p3 { animation: pulse 2.8s ease-in-out infinite 1.2s; }
    .p4 { animation: pulse 2.8s ease-in-out infinite 1.8s; }
  </style>

  <!-- Base background -->
  <rect width="900" height="220" fill="var(--bg)"/>

  <!-- Subtle grid overlay -->
  <g opacity="1">
    <line x1="0" y1="44" x2="900" y2="44"  stroke="var(--grid)" stroke-width="1"/>
    <line x1="0" y1="88" x2="900" y2="88"  stroke="var(--grid)" stroke-width="1"/>
    <line x1="0" y1="132" x2="900" y2="132" stroke="var(--grid)" stroke-width="1"/>
    <line x1="0" y1="176" x2="900" y2="176" stroke="var(--grid)" stroke-width="1"/>
    <line x1="112" y1="0" x2="112" y2="220" stroke="var(--grid)" stroke-width="1"/>
    <line x1="225" y1="0" x2="225" y2="220" stroke="var(--grid)" stroke-width="1"/>
    <line x1="337" y1="0" x2="337" y2="220" stroke="var(--grid)" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="220" stroke="var(--grid)" stroke-width="1"/>
    <line x1="562" y1="0" x2="562" y2="220" stroke="var(--grid)" stroke-width="1"/>
    <line x1="675" y1="0" x2="675" y2="220" stroke="var(--grid)" stroke-width="1"/>
    <line x1="787" y1="0" x2="787" y2="220" stroke="var(--grid)" stroke-width="1"/>
  </g>

  <!-- Pulsing accent dots (scattered) -->
  <circle class="p1" cx="54"  cy="36"  r="2.5" fill="var(--accent)"/>
  <circle class="p2" cx="176" cy="192" r="2"   fill="var(--accent)"/>
  <circle class="p3" cx="724" cy="28"  r="2.5" fill="var(--accent)"/>
  <circle class="p4" cx="848" cy="188" r="2"   fill="var(--accent)"/>
  <circle class="p2" cx="90"  cy="140" r="1.5" fill="var(--accent2)"/>
  <circle class="p3" cx="820" cy="80"  r="1.5" fill="var(--accent2)"/>
  <circle class="p1" cx="450" cy="16"  r="2"   fill="var(--accent2)"/>

  <!-- Top shimmer line -->
  <line x1="0" y1="1" x2="900" y2="1"
        stroke="var(--accent)" stroke-width="2"
        stroke-dasharray="18 6"
        class="shimmer"/>

  <!-- Bottom shimmer line -->
  <line x1="900" y1="219" x2="0" y2="219"
        stroke="var(--accent)" stroke-width="2"
        stroke-dasharray="18 6"
        class="shimmer"/>

  <!-- Left bracket decoration -->
  <path d="M40 68 L24 68 L24 152 L40 152"
        fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right bracket decoration -->
  <path d="M860 68 L876 68 L876 152 L860 152"
        fill="none" stroke="var(--border)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Corner accent marks — top-left -->
  <line x1="0"  y1="20" x2="16" y2="20" stroke="var(--accent)" stroke-width="1.5"/>
  <line x1="20" y1="0"  x2="20" y2="16" stroke="var(--accent)" stroke-width="1.5"/>

  <!-- Corner accent marks — top-right -->
  <line x1="900" y1="20" x2="884" y2="20" stroke="var(--accent)" stroke-width="1.5"/>
  <line x1="880" y1="0"  x2="880" y2="16" stroke="var(--accent)" stroke-width="1.5"/>

  <!-- Corner accent marks — bottom-left -->
  <line x1="0"  y1="200" x2="16"  y2="200" stroke="var(--accent)" stroke-width="1.5"/>
  <line x1="20" y1="220" x2="20"  y2="204" stroke="var(--accent)" stroke-width="1.5"/>

  <!-- Corner accent marks — bottom-right -->
  <line x1="900" y1="200" x2="884" y2="200" stroke="var(--accent)" stroke-width="1.5"/>
  <line x1="880" y1="220" x2="880" y2="204" stroke="var(--accent)" stroke-width="1.5"/>

  <!-- Prompt symbol -->
  <text x="64" y="103"
        font-family="'Courier New', 'Consolas', monospace"
        font-size="22" font-weight="bold"
        fill="var(--accent)" opacity="0.55">~/</text>

  <!-- Name -->
  <text x="450" y="108"
        text-anchor="middle"
        font-family="'Courier New', 'Consolas', monospace"
        font-size="46" font-weight="bold" letter-spacing="-0.5"
        fill="var(--text)">Anmol K Sachan</text>

  <!-- Blinking cursor -->
  <rect class="cursor" x="735" y="71" width="4" height="42" rx="1" fill="var(--accent)"/>

  <!-- Handle -->
  <text x="450" y="138"
        text-anchor="middle"
        font-family="'Courier New', 'Consolas', monospace"
        font-size="13" letter-spacing="1.5"
        fill="var(--accent)">@FR13ND0x7F</text>

  <!-- Separator dots -->
  <text x="450" y="163"
        text-anchor="middle"
        font-family="'Courier New', 'Consolas', monospace"
        font-size="6" letter-spacing="6"
        fill="var(--dim)">◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆◆</text>

  <!-- Role pills -->
  <!-- Security Researcher -->
  <rect x="190" y="172" width="170" height="26" rx="13"
        fill="none" stroke="var(--dim)" stroke-width="1"/>
  <text x="275" y="189"
        text-anchor="middle"
        font-family="'Courier New', 'Consolas', monospace"
        font-size="11" letter-spacing="0.5"
        fill="var(--muted)">Security Researcher</text>

  <!-- Pentester -->
  <rect x="378" y="172" width="90" height="26" rx="13"
        fill="none" stroke="var(--dim)" stroke-width="1"/>
  <text x="423" y="189"
        text-anchor="middle"
        font-family="'Courier New', 'Consolas', monospace"
        font-size="11" letter-spacing="0.5"
        fill="var(--muted)">Pentester</text>

  <!-- Bug Bounty Hunter -->
  <rect x="485" y="172" width="152" height="26" rx="13"
        fill="none" stroke="var(--dim)" stroke-width="1"/>
  <text x="561" y="189"
        text-anchor="middle"
        font-family="'Courier New', 'Consolas', monospace"
        font-size="11" letter-spacing="0.5"
        fill="var(--muted)">Bug Bounty Hunter</text>

</svg>
